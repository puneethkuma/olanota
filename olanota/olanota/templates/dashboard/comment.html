 {% extends "dashboard/base.html" %}
 {% load static %}
{% block content %}
{% include "dashboard/sidebar.html" %} 

<main id="main" class="main">  

  <section class="section dashboard">
     <div class="pagetitle">
    <h1>Comment</h1>
    <nav>
    <ol class="breadcrumb">
      <li class="breadcrumb-item"><a href="#">Home</a></li>
      <li class="breadcrumb-item active">Comment</li>
    </ol>
    </nav>
  </div><!-- End Page Title -->






 
<div class="container">
    <div class="row">
      {% for items in post %}
        <div class="col-sm-6 col-md-6  mb-3">
            <div class="card">
                <div class="card-body">

                    <!-- Profile picture and short information -->
                    <div class="d-flex align-items-center position-relative py-3">
                  
                      <div class="flex-grow-1 ">
                        <p class="text-info">News</p>
                        <a href="{% url 'base:detail' items.news.slug items.news.pk %}" class="text-link m-0">{{items.news.Title}}</a>
                        <h5  class="h5 fw-bold border-top pt-3">{{items.name}}</h5>
                            <a href="mailto:{{items.email}}" class="text-muted m-0">{{items.email}}</a>
                        </div>
                    </div>
                    <p>{{items.content}}</p>
                    <!-- END : Profile picture and short information -->

                    <!-- Options buttons -->
                    <div class="mt-3 pt-2 text-center border-top">
                        <div class="d-flex justify-content-center gap-3">
                            <a href="{% url "base:delete_comment" items.id %}" class="btn btn-sm btn-danger btn-outline-light btn-lg">
                                                <i class="fa fa-trash" aria-hidden="true"></i> Delete
                                            </a>
                         -
                        </div>
                    </div>
                    <!-- END : Options buttons -->

                </div>
            </div>
        </div>
     {% endfor %}
    </div>
</div>
     

    </div>
  </section>

  </main><!-- End #main -->
  {% endblock content %}
