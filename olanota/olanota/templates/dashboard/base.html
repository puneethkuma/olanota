{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
   <title>olanota Dashboard</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="keywords"
        content="olanota political news crime news local state news central news government news" />
    <meta name="description"
        content="olanota political news crime news local state news central news government news" />
  <meta name="robots" content="noindex, nofollow">

  <!-- Favicons -->
<link rel="shortcut icon" href="{% static "images/favicon.ico" %}">
    <link rel="apple-touch-icon" sizes="180x180" href="{% static "images/apple-touch-icon.png" %}">
    <link rel="icon" type="image/png" sizes="32x32" href="{% static "images/favicon-32x32.png" %}">
    <link rel="icon" type="image/png" sizes="16x16" href="{% static "images/favicon-16x16.png" %}">

  <!-- Google Fonts -->
  <link href="https://fonts.gstatic.com" rel="preconnect">
  <link
    href="https://fonts.googleapis.com/css?family=Open+Sans:300,300i,400,400i,600,600i,700,700i|Nunito:300,300i,400,400i,600,600i,700,700i|Poppins:300,300i,400,400i,500,500i,600,600i,700,700i"
    rel="stylesheet">

  <!-- Vendor CSS Files -->
  <link rel="stylesheet" type="text/css" href="{% static "assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet" %}">
  <link rel="stylesheet" type="text/css" href="{% static "assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet" %}">
  <link rel="stylesheet" type="text/css" href="{% static "assets/vendor/simple-datatables/style.css" rel="stylesheet" %}">

  <!-- Template Main CSS File -->
<link rel="stylesheet" type="text/css" href="{% static "/assets/css/style.css"  %}" />
</head>
<body >
     {% for message in messages %}
   <div id="message" class="container">
    <div class="alert {{ message.tags }} alert-dismissible shadow fade show" role="alert">
        {{ message | safe }}
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    </div>
{% endfor %}
  {% block content %}{% endblock content %}

  <!-- ======= Footer ======= -->
  <footer id="" class="footer">
    <div class="copyright">
      &copy; 2025 Copyright <strong><span>olanota</span></strong>. All Rights Reserved
    </div>
    <div class="credits">Powered by <a href="http://hashtocolon.com/">Hashtocolon Systems</a>
    </div>
  </footer><!-- End Footer -->

  <a href="#" class="back-to-top d-flex align-items-center justify-content-center"><i
      class="bi bi-arrow-up-short"></i></a>

  <!-- Vendor JS Files -->
  <script src="{% static "assets/vendor/bootstrap/js/bootstrap.bundle.min.js" %}"></script>
  <script src="{% static "assets/vendor/simple-datatables/simple-datatables.js" %}"></script>
  <!-- Template Main JS File -->
  <script src="{% static "assets/js/main.js" %}"></script>

</body>

</html>
